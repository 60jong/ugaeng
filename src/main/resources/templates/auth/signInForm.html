<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/css/style.css">
    <title>UGAENG ID</title>
</head>
<body class="center-body">

    <div class="wrapper-signin">
        <div class="logo-center">
            <a href="/"><img src="/img/ugaeng_logo.svg"></a>
        </div>

        <form th:action="@{/auth/signin}" th:method="post">
            <div class="input-box">
                <input class="form-control" type="text" name="username" placeholder="Username"
                required/>
                <i class='bx bxs-user' ></i>
            </div>
            <div class="input-box">
                <input class="form-control" type="password" name="password" placeholder="Password"
                required/>
                <i class='bx bxs-lock-alt' ></i>
            </div>

            <div class="remember-forgot">
                <label> <input type="checkbox"> 자동 로그인 </input></label>
                <a th:href="@{/auth/password/edit}">Forgot password?</a>
            </div>

            <button type="submit" class="btn">Sign in</button>

            <div class="register-link">
                <p>Don't have an account?  <a th:href="@{/auth/signup}">Register</a></p>
            </div>
<!--                <div>-->
<!--                    <button class="btn btn-primary float-end">-->
<!--                        authenticate-->
<!--                    </button>-->
<!--                </div>-->
        </form>
    </div>
</body>
</html>
