<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link th:href="@{/css/bootstrap.min.css}"
          href="/css/bootstrap.min.css" rel="stylesheet">
    <title>UGAENG</title>
</head>
<body>

    <form th:action="@{/users/{userId}/profile/edit(userId=${userProfileResponse.id})}" th:method="post">
        <div>
            <h2>User Profile</h2>
            <label>USERNAME</label>
            <input type="text" id="username" name="username" th:value="${userProfileResponse.username}">
        </div>
        <hr>

        <div>
            <div>
                <button type="submit">저장</button>
            </div>
        </div>

    </form>

</body>
</html>
